name: Publish editorial

# Trigger manually from GitHub Actions UI or via API
on:
  workflow_dispatch:
    inputs:
      draft_file:
        description: 'Path to markdown draft (e.g. editorials/drafts/voorbeeld-editorial.md)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-editorial
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish editorial (with DeepL translations)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python3 scripts/publish_editorial.py "${{ github.event.inputs.draft_file }}"

      - name: Commit & push
        run: |
          git config user.name  "editorial-bot"
          git config user.email "editorial-bot@esrf.net"
          git add -A
          SLUG=$(echo "${{ github.event.inputs.draft_file }}" | sed 's|.*/||;s|\.md$||')
          git commit -m "editorial: ${SLUG} — published via automation [DeepL i18n]"
          git push
