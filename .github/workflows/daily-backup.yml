name: Daily Backup

on:
  schedule:
    # Elke nacht om 02:00 UTC (04:00 CEST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Handmatig triggeren mogelijk

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create dated ZIP archive
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "BACKUP_DATE=${DATE}" >> $GITHUB_ENV
          zip -r "ESRF-backup-${DATE}.zip" . -x ".git/*" ".github/*"
          ls -lh "ESRF-backup-${DATE}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "backup-${{ env.BACKUP_DATE }}"
          name: "Backup ${{ env.BACKUP_DATE }}"
          body: "Automatische dagelijkse backup van esrf.net — ${{ env.BACKUP_DATE }}"
          files: "ESRF-backup-${{ env.BACKUP_DATE }}.zip"

      - name: Summary
        run: echo "✅ Backup ESRF-backup-${{ env.BACKUP_DATE }}.zip published as GitHub Release"
