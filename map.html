<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr" crossorigin="anonymous"></script>
<script src="assets/flags.js"></script>
<script src="i18n/i18n.js"></script>
<script src="app.js"></script>
<script>
(async () => {
  const orgs = await loadOrgs();

  // ── Sector chips rendered via i18n ──
  const SECTOR_CHIPS = [
    {key:'', shortKey:'common.all_sectors', fullKey:null, count:null},
    {key:'Emergency & Crisis Response', shortKey:'sector.short_emergency', count:469},
    {key:'Security & Protection', shortKey:'sector.short_security', count:382},
    {key:'Risk & Continuity Management', shortKey:'sector.short_risk', count:366},
    {key:'Digital Infrastructure & Cybersecurity', shortKey:'sector.short_digital', count:187},
    {key:'Knowledge, Training & Research', shortKey:'sector.short_knowledge', count:159},
    {key:'Health & Medical Manufacturing', shortKey:'sector.short_health', count:135},
    {key:'Critical Infrastructure', shortKey:'sector.short_critical', count:121},
    {key:'Dual-use Technology & Manufacturing', shortKey:'sector.short_dual_use', count:53},
    {key:'Transport, Maritime & Aerospace', shortKey:'sector.short_transport', count:11},
    {key:'Energy & Grid Resilience', shortKey:'sector.short_energy', count:7},
  ];
  function renderChips(){
    const wrap = document.getElementById('sector-chips');
    wrap.innerHTML = SECTOR_CHIPS.map(c=>{
      const isAll = c.key==='';
      const label = isAll ? t('filter.all_sectors','All sectors')
                          : `${t(c.shortKey, c.shortKey.split('.').pop())} · ${c.count}`;
      const active = c.key === (state?.sector || '');
      return `<button class="chip${active?' active':''}" data-sector="${esc(c.key)}">${label}</button>`;
    }).join('');
  }
  window.addEventListener('esrf:langchange', renderChips);
  const map = L.map('map', {
    zoomControl:true, attributionControl:true, minZoom:3, maxZoom:18,
  }).setView([52.0, 13.0], 4);
  map.zoomControl.setPosition('bottomright');

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap contributors · © CartoDB',
    subdomains:'abcd', maxZoom:19,
  }).addTo(map);

  const cluster = L.markerClusterGroup({
    maxClusterRadius: 55,
    showCoverageOnHover:false,
    iconCreateFunction: function(c){
      const count = c.getChildCount();
      const size = count < 10 ? 32 : count < 100 ? 40 : count < 500 ? 52 : 64;
      return L.divIcon({
        html: `<div style="background:#D24B1F;color:#F8F2E6;width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:12px;letter-spacing:0.05em;border:2px solid #F8F2E6;box-shadow:0 2px 8px rgba(15,20,25,0.25)">${count}</div>`,
        className:'esrf-cluster', iconSize:[size,size],
      });
    }
  });
  map.addLayer(cluster);

  const panel = document.getElementById('panel');
  const panelBody = document.getElementById('panel-body');
  document.getElementById('panel-close').addEventListener('click', ()=>{
    panel.classList.remove('open'); panel.setAttribute('aria-hidden','true');
  });

  function openPanel(o){
    panelBody.innerHTML = `
      <div class="sector-tag" style="color:${sectorColorHex(o.sector_normalized)}">${esc(o.sector_normalized)}</div>
      <h2>${esc(o.name)}</h2>
      <div class="loc">${esc(o.city||'')}${o.city?' · ':''}${esc(o.country_name_en || o.country || '')}</div>
      <p class="desc">${esc(o.description_en || '')}</p>
      ${o.website ? `<a class="visit" href="${esc(o.website)}" target="_blank" rel="noopener">${t('common.visit_website','Visit website ↗')}</a>` : ''}
    `;
    panel.classList.add('open'); panel.setAttribute('aria-hidden','false');
  }

  let currentMarkers = [];
  function rebuild(filterFn){
    cluster.clearLayers();
    currentMarkers = [];
    orgs.forEach(o => {
      if(typeof o.lat !== 'number' || typeof o.lon !== 'number') return;
      if(o.lat === 0 && o.lon === 0) return;  // skip null-island placeholders
      if(!filterFn(o)) return;
      const c = sectorColorHex(o.sector_normalized);
      const m = L.circleMarker([o.lat, o.lon], {
        radius:6, color:'#F8F2E6', fillColor:c, fillOpacity:0.9, weight:1.5,
      });
      m.bindTooltip(`<b>${esc(o.name)}</b><br>${esc(o.city||'')} · ${esc(o.country_name_en||'')}`, {direction:'top',offset:[0,-6]});
      m.on('click', ()=>openPanel(o));
      currentMarkers.push(m);
    });
    cluster.addLayers(currentMarkers);
    document.getElementById('count').textContent = currentMarkers.length.toLocaleString('en-GB');
  }

  const state = { sector:'', q:'' };
  renderChips();
  function apply(){
    rebuild(o => {
      if(state.sector && o.sector_normalized !== state.sector) return false;
      if(state.q){
        const hay = [o.name, o.city, o.country_name_en, o.sector_normalized].join(' ').toLowerCase();
        if(!hay.includes(state.q)) return false;
      }
      return true;
    });
  }

  document.getElementById('sector-chips').addEventListener('click', (e)=>{
    const chip = e.target.closest('.chip'); if(!chip) return;
    state.sector = chip.dataset.sector;
    document.querySelectorAll('#sector-chips .chip').forEach(c=>c.classList.toggle('active', c.dataset.sector===state.sector));
    apply();
  });
  document.getElementById('q').addEventListener('input', (e)=>{
    state.q = e.target.value.trim().toLowerCase(); apply();
  });

  apply();
})();
</script>
