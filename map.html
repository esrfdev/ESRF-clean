<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Atlas — ESRF.net</title>
<meta name="description" content="The full-screen community atlas — 1,892 organisations mapped across 29 European countries, colour-coded by sector and filterable by pillar." />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Archivo:wght@400..800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<link rel="stylesheet" href="style.css" />
<style>
  html,body{height:100%;overflow:hidden}
  .leaflet-container{font-family:'PT Serif',serif}
</style>
</head>
<body class="map-page">

<nav class="mast" aria-label="Primary">
  <div class="mast-inner">
    <a href="index.html" class="mast-logo">ESRF.net<sup>VOL·01</sup></a>
    <button class="mast-burger" aria-label="Toggle navigation" aria-controls="primary-nav">≡</button>
    <div class="mast-nav" id="primary-nav">
      <a href="about.html">Foundation</a>
      <a href="directory.html">Directory</a>
      <a href="map.html" aria-current="page">Atlas</a>
      <a href="analytics.html">Analytics</a>
      <a href="news.html">Dispatch</a>
      <a href="mailto:hello@esrf.net" class="mast-cta">Request listing</a>
    </div>
  </div>
</nav>

<div class="map-wrap">
  <div id="map" role="application" aria-label="Interactive map of European organisations"></div>

  <aside class="map-controls" aria-label="Map filters">
    <div class="kicker">§ 04 · The Atlas</div>
    <h2>Community Atlas</h2>
    <p style="font-family:'PT Serif',serif;font-style:italic;font-size:14px;color:var(--ink-soft);margin:6px 0 14px">Click any marker for organisation detail. Filter by pillar or search by name.</p>

    <input id="q" type="search" placeholder="Search organisations…" aria-label="Search organisations" />

    <span class="filter-group-label">Pillar</span>
    <div class="filter-chips" style="margin:0;gap:6px" id="pillar-chips">
      <button class="chip active" data-pillar="">All</button>
      <button class="chip pillar-prevent" data-pillar="prevent">Prevent</button>
      <button class="chip pillar-protect" data-pillar="protect">Protect</button>
      <button class="chip pillar-prepare" data-pillar="prepare">Prepare</button>
      <button class="chip pillar-respond" data-pillar="respond">Respond</button>
      <button class="chip pillar-recover" data-pillar="recover">Recover</button>
    </div>

    <div class="map-count"><strong id="count">—</strong> · plotted <span style="opacity:.7">of 1,892</span></div>
  </aside>

  <aside class="map-panel" id="panel" aria-label="Organisation detail" aria-hidden="true">
    <button class="map-panel-close" id="panel-close" aria-label="Close panel">✕ Close</button>
    <div id="panel-body"></div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="app.js"></script>
<script>
(async () => {
  const orgs = await loadOrgs();
  const map = L.map('map', {
    zoomControl:true, attributionControl:true, minZoom:3, maxZoom:18,
  }).setView([52.0, 13.0], 4);
  map.zoomControl.setPosition('bottomright');

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap contributors · © CartoDB',
    subdomains:'abcd', maxZoom:19,
  }).addTo(map);

  const cluster = L.markerClusterGroup({
    maxClusterRadius: 55,
    showCoverageOnHover:false,
    iconCreateFunction: function(c){
      const count = c.getChildCount();
      const size = count < 10 ? 32 : count < 100 ? 40 : count < 500 ? 52 : 64;
      return L.divIcon({
        html: `<div style="background:#D24B1F;color:#F8F2E6;width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:12px;letter-spacing:0.05em;border:2px solid #F8F2E6;box-shadow:0 2px 8px rgba(15,20,25,0.25)">${count}</div>`,
        className:'esrf-cluster', iconSize:[size,size],
      });
    }
  });
  map.addLayer(cluster);

  const panel = document.getElementById('panel');
  const panelBody = document.getElementById('panel-body');
  document.getElementById('panel-close').addEventListener('click', ()=>{
    panel.classList.remove('open'); panel.setAttribute('aria-hidden','true');
  });

  function openPanel(o){
    const pillar = pillarOf(o.sector_normalized);
    const meta = PILLAR_META[pillar];
    panelBody.innerHTML = `
      <div class="pillar-tag" style="color:${meta.color}">${meta.verb} · ${meta.virtue}</div>
      <div class="sector">${esc(o.sector_normalized)}</div>
      <h2>${esc(o.name)}</h2>
      <div class="loc">${esc(o.city||'')}${o.city?' · ':''}${esc(o.country_name_en || o.country || '')}</div>
      <p class="desc">${esc(o.description_en || '')}</p>
      ${o.website ? `<a class="visit" href="${esc(o.website)}" target="_blank" rel="noopener">Visit website ↗</a>` : ''}
    `;
    panel.classList.add('open'); panel.setAttribute('aria-hidden','false');
  }

  let currentMarkers = [];
  function rebuild(filterFn){
    cluster.clearLayers();
    currentMarkers = [];
    orgs.forEach(o => {
      if(typeof o.lat !== 'number' || typeof o.lon !== 'number') return;
      if(!filterFn(o)) return;
      const c = sectorColor(o.sector_normalized);
      const m = L.circleMarker([o.lat, o.lon], {
        radius:6, color:'#F8F2E6', fillColor:c, fillOpacity:0.9, weight:1.5,
      });
      m.bindTooltip(`<b>${esc(o.name)}</b><br>${esc(o.city||'')} · ${esc(o.country_name_en||'')}`, {direction:'top',offset:[0,-6]});
      m.on('click', ()=>openPanel(o));
      currentMarkers.push(m);
    });
    cluster.addLayers(currentMarkers);
    document.getElementById('count').textContent = currentMarkers.length.toLocaleString('en-GB');
  }

  const state = { pillar:'', q:'' };
  function apply(){
    rebuild(o => {
      if(state.pillar && pillarOf(o.sector_normalized) !== state.pillar) return false;
      if(state.q){
        const hay = [o.name, o.city, o.country_name_en, o.sector_normalized].join(' ').toLowerCase();
        if(!hay.includes(state.q)) return false;
      }
      return true;
    });
  }

  document.getElementById('pillar-chips').addEventListener('click', (e)=>{
    const chip = e.target.closest('.chip'); if(!chip) return;
    state.pillar = chip.dataset.pillar;
    document.querySelectorAll('#pillar-chips .chip').forEach(c=>c.classList.toggle('active', c.dataset.pillar===state.pillar));
    apply();
  });
  document.getElementById('q').addEventListener('input', (e)=>{
    state.q = e.target.value.trim().toLowerCase(); apply();
  });

  apply();
})();
</script>
</body>
</html>
